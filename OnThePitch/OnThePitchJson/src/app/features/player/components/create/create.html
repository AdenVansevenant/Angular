  <div class="container">
    <br />
    <div class="row">
      <div class="col">
        <h3>Create Player</h3>
      </div>
      <div class="col text-right">
        <a href="#" routerLink="/players/list" class="btn btn-secondary btn-sm">Back To Players List</a>
      </div>
    </div>
    <br />
    <form [formGroup]="createForm" (ngSubmit)="onSubmit()" novalidate>
       
      <div class="form-group">
        <label for="shirtNo">Shirt No:</label>
        <input formControlName="shirtNo"
               id="shirtNo"
               type="text"
               class="form-control" />
      </div>
  
      <div class="form-group">
        <label for="name">Name:</label>
        <input formControlName="name"
               id="name"
               type="text"
               class="form-control" />
      </div>

      <div class="form-group">
        <label for="name">Position:</label>
        <select formControlName="positionId"
                id="positionId"
                class="form-control">
          <option value="">- Select -</option>
       @if (positions$ | async; as positions) {
  @for (position of positions; track position.id) {
    <option [value]="position.id">
      {{ position.name }}
    </option>
  }
}
        </select>
      </div>
  
      <div class="form-group">
        <label for="appearances">Appearances:</label>
        <input formControlName="appearances"
               id="appearances"
               type="text"
               class="form-control" />
      </div>
  
      <div class="form-group">
        <label for="goals">Goals:</label>
        <input formControlName="goals"
               id="goals"
               type="text"
               class="form-control" />
      </div>
      <div class="form-group">
        <label for="goals">GoalsPerMatch:</label>
        <input formControlName="goalspermatch"
               id="goalspermatch"
               type="text"
               class="form-control" />
      </div>

      <div class="pitch-boundary">
        <div
          class="player"
          cdkDragBoundary=".pitch-boundary"
          cdkDrag
          (cdkDragEnded)="onDragEnded($event)"
        >
          <img src="/images/player.JPG" alt="Player" />
        </div>
      </div>

      <button class="btn btn-primary" type="submit" [disabled]="!createForm.valid">Create</button>
    </form>
  </div>
